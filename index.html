<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>최하늘</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="top-bar">
        <img src="close-circle.svg" class="top-icon" alt="닫기" />
        <img src="more-horizontal.svg" class="top-icon" alt="메뉴" />
      </div>

      <div class="profile-bg"></div>

      <div class="profile-section">
        <img src="haneul.jpg" class="profile-img" alt="프로필 사진" />
        <div class="profile-text">
          <h2 class="profile-name">최하늘</h2>
          <p class="profile-intro">
            안녕하세요!<br />아래 사진들을 클릭해서<br />저에 대해 알아보세요😻
          </p>
        </div>
      </div>

      <input type="checkbox" id="notice-toggle" class="notice-check" />

      <label for="notice-toggle" class="kakao-notice">
        <img src="kakao_icon.png" class="notice-icon" alt="카톡" />
        <div class="notice-text">
          <p class="notice-sender">카카오톡</p>
          <p class="notice-msg">📧 chn384012@naver.com / 📞 010-8779-3840</p>
        </div>
      </label>

      <div class="profile-actions">
        <label for="notice-toggle" class="action-item">
          <img src="email.svg" alt="이메일" />
          <span>정보 확인</span>
        </label>
        <label for="notice-toggle" class="action-item">
          <img src="phone.svg" alt="통화" />
          <span>연락처 보기</span>
        </label>
      </div>

      <div class="feed-container">
        <div class="feed-item">
          <input type="checkbox" id="modal-about" class="modal-check" />
          <label for="modal-about">
            <img src="photo1.jpg" alt="About Me" />
            <div class="overlay">About Me</div>
          </label>
          <div class="modal-content">
            <div class="modal-box">
              <h3>About Me 🦁</h3>
              <p>
                저는 AI빅데이터융합경영학과<br />24학번 05년생 최하늘입니다!
                <br />
                인친 블친 모두 환영해요~!
              </p>
              <div class="social-links">
                <a href="https://instagram.com/havveure_" target="_blank"
                  ><img src="instagram.png" class="icon"
                /></a>
                <a href="https://github.com/chn384012" target="_blank"
                  ><img src="github.png" class="icon"
                /></a>
                <a href="https://blog.naver.com/everillow" target="_blank"
                  ><img src="blog.png" class="icon"
                /></a>
              </div>
              <label for="modal-about" class="close-btn">닫기</label>
            </div>
          </div>
        </div>

        <div class="feed-item">
          <input type="checkbox" id="modal-fav" class="modal-check" />
          <label for="modal-fav">
            <img src="photo2.jpg" alt="Favorite" />
            <div class="overlay">Favorite</div>
          </label>
          <div class="modal-content">
            <div class="modal-box">
              <h3>Favorite</h3>
              <p>
                -취미: 밴드 음악 듣기, 공연 보기 <br />좋아하는 것: 귀여운 거
                <br />싫어하는 거: 벌레, 맛없는 음식 <br />*tmi: 클릭한 고양이
                사진은<br />제가 키우는 고양이고, <br />이름은 몽이랍니다!
              </p>
              <label for="modal-fav" class="close-btn">닫기</label>
            </div>
          </div>
        </div>

        <div class="feed-item">
          <input type="checkbox" id="modal-play" class="modal-check" />
          <label for="modal-play">
            <img src="photo4.jpg" alt="Playlist" />
            <div class="overlay">Playlist</div>
          </label>
          <div class="modal-content">
            <div class="modal-box">
              <h3>Playlist🎧</h3>
              <p>봄에 듣기 좋은 노래들 추천합니다🌸</p>
              <img
                src="playlist.jpg"
                class="full-playlist-img"
                alt="플레이리스트 사진"
              />
              <label for="modal-play" class="close-btn">닫기</label>
            </div>
          </div>
        </div>

        <div class="feed-item">
          <input type="checkbox" id="modal-album" class="modal-check" />
          <label for="modal-album">
            <img src="photo3.jpg" alt="My Album" />
            <div class="overlay">Album</div>
          </label>

          <div class="modal-content">
            <div class="modal-box album-modal">
              <h3>My Photo Album 🖼️</h3>
              <p>필름 카메라로 직접 찍은 사진들입니다📷</p>

              <div class="album-grid">
                <img src="my_pic1.jpg" alt="사진1" />
                <img src="my_pic2.jpg" alt="사진2" />
                <img src="my_pic3.jpg" alt="사진3" />
                <img src="my_pic4.jpg" alt="사진4" />
              </div>

              <label for="modal-album" class="close-btn">닫기</label>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
